<app-section-header-component [title]="'Prestamos'" />

<section class="p-4 grid grid-cols-1 gap-4">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <app-loan-policy-component/>
  </div>

  @if (errorMessage()) {
    <app-message-error-component [message]="errorMessage()" />
  }

  <app-loan-list-component 
    [isLoading]="isLoading()"
    [paginationAndLoanList]="computedPaginationAndLoanList()"
    [selectStatusId]="selectStatusId()"
    (onSelectedIdStatus)="onFilterByIdStatus($event)"
    (onReload)="onReloadLoan()"
    (onNextPage)="nextPage()"
    (onPrevPage)="prevPage()"    
  />
</section>
