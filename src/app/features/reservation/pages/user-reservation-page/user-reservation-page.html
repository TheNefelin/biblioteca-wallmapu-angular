<app-section-header-component [title]="'Reservas'" />

<section class="p-4 grid grid-cols-1 gap-4">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <app-reservation-barcode-components
      [reservationDetail]="selectedReservation()"
    />
    
    <app-loan-policy-component/>
  </div>

  @if (successMessage()) {
    <app-message-success-component [message]="successMessage()" />
  }
  
  @if (errorMessage()) {
    <app-message-error-component [message]="errorMessage()" />
  }
  
  <div>
    <app-reservation-list-components
      [isLoading]="isLoading()"
      [paginationAndReservationList]="computedPaginationAndReservationList()"
      [selectStatusId]="selectStatusId()"
      (onSelectedReservation)="onSelectedReservation($event)"
      (onSelectedIdStatus)="onFilterByIdStatus($event)"
      (onCancelReservation)="onCancelReservation($event)"
      (onReload)="reloadReservation()"
      (onNextPage)="nextPage()"
      (onPrevPage)="prevPage()"
    />
  </div>
</section>

<app-modal-action-component
  [textTitle]="'Cancelar Reserva'"
  [textContent]="'¿Estás seguro que deseas cancelar la Reserva?'"
  [textName]="'Elemento'"
  [isOpen]="isModalOpen()"
  [isLoading]="isLoading()"
  (onConfirm)="onConfirmCancelReservation()"
  (onModalClose)="closeModal()"
/>
